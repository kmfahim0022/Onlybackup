<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="glow">
    <a href="/">🏠 Home</a>
    <a href="/gallery">📷 Gallery</a>
    <a href="/files">📁 Files</a>
    <a href="/contacts">👤 Contacts</a>
    <a href="/settings">⚙ Settings</a>
</nav>

<div class="container">
    <h1>👤 Contact Backup</h1>

    <div class="card glow">
        <h2>Export Contacts to VCF</h2>
        <form action="/export_vcf" method="post">
            <textarea name="contacts" placeholder="Name,Number&#10;Rahim,017xxxxxxxx&#10;Karim,018xxxxxxxx" rows="5"></textarea>
            <button class="btn">Download VCF</button>
        </form>
    </div>

    <div class="card glow">
        <h2>Import VCF</h2>
        <form action="/import_vcf" method="post" enctype="multipart/form-data">
            <input type="file" name="vcf" accept=".vcf">
            <button class="btn">Import</button>
        </form>
    </div>

    <a href="/"><button class="btn">Back to Home</button></a>
</div>

</body>
</html>
